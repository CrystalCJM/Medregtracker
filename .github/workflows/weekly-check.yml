name: 每周法规查新

on:
  schedule:
    - cron: '0 6 * * 4'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: pip install requests beautifulsoup4
        
      - name: Run regulatory check
        run: python scripts/fetch_updates.py
        
      - name: Generate newsletter draft
        run: |
          REPORT=$(ls data/report_*.json | tail -1)
          python scripts/generate_newsletter.py "$REPORT"
          
      - name: Commit results
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "draft: weekly regulatory check $(date +%Y-%m-%d) [skip ci]"
          file_pattern: "data/ docs/newsletters/"
          push_options: '--force-with-lease'  
