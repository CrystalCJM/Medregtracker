name: 每周法规查新

on:
  schedule:
    - cron: '0 6 * * 4'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: pip install requests beautifulsoup4
        
      - name: Run regulatory check
        run: python scripts/fetch_updates.py
        
      - name: Generate newsletter draft
        run: |
          REPORT=$(ls data/report_*.json | tail -1)
          python scripts/generate_newsletter.py "$REPORT"
          
      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ docs/newsletters/
          git diff --staged --quiet || git commit -m "draft: weekly regulatory check $(date +%Y-%m-%d) [skip ci]"
          git pull origin main --rebase || true
          git push origin main
